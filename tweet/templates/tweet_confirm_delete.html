{% extends "layout.html" %}

{% block title %}
Django Application 
{% endblock %}

{% block content %}
<div class="container text-center mt-5">
    <h1 class="mb-4">
        Are you sure that you want to delete the tweet?
    </h1>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-5 me-3">
            Delete
        </button>

        <a href="{% url 'tweet_list' %}" class="btn btn-success px-5">
            Cancel
        </a>
    </form>
</div>

{% endblock %}
